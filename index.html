<!doctype html>
<html class="dark" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demos ByteShark</title>
    <meta
      name="description"
      content="Catalogo de demos web de ByteShark para distintos tipos de negocio."
    />
    <meta name="theme-color" content="#081B34" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function (location) {
        if (location.search[1] === '/') {
          const decoded = location.search
            .slice(1)
            .split('&')
            .map((segment) => segment.replace(/~and~/g, '&'))
            .join('?');

          window.history.replaceState(null, '', location.pathname.slice(0, -1) + decoded + location.hash);
        }
      })(window.location);
    </script>
  </head>
  <body class="selection:bg-primary-container selection:text-on-primary-container">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
